<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Products Grid</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #ffffff, #ffe4ec, #e0f7ff);
  margin: 0;
  padding: 20px;
  text-align: center;
}

h1 {
  color: #333;
}

/* GRID */
.container {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  max-width: 900px;
  margin: auto;
}

/* CARD */
.product {
  background: white;
  border-radius: 15px;
  padding: 15px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
  transition: 0.3s;
}

.product:hover {
  transform: translateY(-5px);
}

/* IMAGE */
.product img {
  width: 40px;
  height: 40px;
  object-fit: cover;
  margin-bottom: 10px;
}

/* TITLE */
.product span {
  display: block;
  font-size: 14px;
  color: #444;
}

/* BUTTONS */
.buttons {
  margin-top: 20px;
}

button {
  padding: 10px 20px;
  margin: 5px;
  border: none;
  border-radius: 20px;
  cursor: pointer;
  font-weight: bold;
  background: linear-gradient(45deg, #ff9a9e, #89f7fe);
  color: black;
  transition: 0.3s;
}

button:hover {
  opacity: 0.8;
}
</style>
</head>

<body>

<h1>Products</h1>

<div class="container" id="products"></div>

<div class="buttons">
  <button onclick="prevPage()">⬅ Prev</button>
  <button onclick="nextPage()">Next ➡</button>
</div>

<script>
let limit = 14;
let skip = 0;

// ✅ Track sent pages
let sentPages = new Set();

async function fetchProducts() {
  try {
    const res = await fetch(`https://dummyjson.com/products?limit=${limit}&skip=${skip}`);
    const data = await res.json();

    displayProducts(data.products);

    // ✅ Unique page key
    let pageKey = skip;

    // ✅ Only send if not already sent
    if (!sentPages.has(pageKey)) {
      await fetch("http://localhost:3000/products", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(data.products)
      });

      sentPages.add(pageKey); // mark as sent
      console.log("Data sent to backend");
    } else {
      console.log("Already sent, skipping...");
    }

  } catch (err) {
    console.error(err);
  }
}

function displayProducts(products) {
  const container = document.getElementById("products");
  container.innerHTML = "";

  products.forEach(p => {
    container.innerHTML += `
      <div class="product">
        <img src="${p.thumbnail}" />
        <span>${p.title}</span>
      </div>
    `;
  });
}

function nextPage() {
  skip += limit;
  fetchProducts();
}

function prevPage() {
  if (skip >= limit) {
    skip -= limit;
    fetchProducts();
  }
}

// initial load
fetchProducts();
</script>

</body>
</html>
